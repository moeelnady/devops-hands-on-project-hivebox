# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Java CI with DevSecOps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:

# =========================
# BUILD + TEST JOB
# =========================

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    #  Run unit tests
    - name: Run Tests
      run: mvn -B test --file HiveBox/pom.xml

    # Build application
    - name: Build with Maven
      run: mvn -B package --file HiveBox/pom.xml

    # Run application
    - name: Run application
      run: |
        java -jar HiveBox/target/*.jar &
        sleep 20

    # Integration test
    - name: Test /version endpoint
      run: |
        response=$(curl -s http://localhost:8080/v1/version)
        echo "Response: $response"

        if [[ "$response" != *"v0.0.1"* ]]; then
          echo "Version check failed!"
          exit 1
        fi

# =========================
# CODE QUALITY + SECURITY
# =========================

  security:

    runs-on: ubuntu-latest
    needs: build
    name: Build and analyze
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=moeelnady_devops-hands-on-project-hivebox
  
    # =========================
    # SEMGREP (SAST)
    # =========================

      - name: Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"

# =========================
# KUBERNETES SECURITY
# =========================

  terrascan:

    runs-on: ubuntu-latest
    needs: build

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Terrascan
      uses: accurics/terrascan-action@main
      with:
        iac_type: "kubernetes"
        iac_dir: "./k8s"
        policy_type: "kubernetes"
        only_warn: false

# =========================
# DOCKER BUILD + LINT
# =========================

  docker:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # RESTORED: Dockerfile lint (Run this BEFORE building)
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: HiveBox/Dockerfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build the JAR
      - name: Build JAR
        run: mvn -B package -f HiveBox/pom.xml -DskipTests

      # Login (Ensures the previous "unauthorized" error is gone)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./HiveBox
          file: HiveBox/Dockerfile
          push: true
          tags: moeelnady/hivebox:latest

